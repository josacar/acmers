name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Package as .deb
        run: ./scripts/build-deb.sh --binary target/release/acmers --arch ${{ matrix.arch }} --output-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: acmers-${{ matrix.arch }}
          path: dist/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - run: mkdir -p dist && find artifacts -name '*.deb' -exec cp {} dist/ \;
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*.deb
