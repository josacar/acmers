name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package as .deb
        run: |
          ARCH="${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'amd64' || 'arm64' }}"
          ./scripts/build-deb.sh --binary target/${{ matrix.target }}/release/acmers --arch "$ARCH" --output-dir ./dist
      - uses: actions/upload-artifact@v4
        with:
          name: acmers-${{ matrix.target }}
          path: dist/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: mkdir -p dist && find artifacts -name '*.deb' -exec cp {} dist/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
