name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test

  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Package as .deb
        run: ./scripts/build-deb.sh --binary target/release/acmers --arch ${{ matrix.arch }} --output-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: acmers-${{ matrix.arch }}
          path: dist/*.deb
